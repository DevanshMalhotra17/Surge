<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surge | During a Flood</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Courier+Prime:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Custom cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Scroll progress bar -->
    <div class="scroll-bar" id="scrollBar"></div>

    <!-- Background -->
    <div class="bg-water">
        <div class="wave-lines">
            <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" height="200">
                <path
                    d="M0,80 C180,40 360,120 540,80 C720,40 900,120 1080,80 C1260,40 1380,100 1440,80 L1440,200 L0,200 Z"
                    fill="rgba(14,77,146,0.12)" />
                <path
                    d="M0,100 C200,60 400,140 600,100 C800,60 1000,140 1200,100 C1320,75 1400,110 1440,100 L1440,200 L0,200 Z"
                    fill="rgba(26,111,191,0.08)" style="animation-delay:-3s" />
            </svg>
        </div>
        <div class="particles" id="particles"></div>
    </div>
    <div class="grain"></div>

    <!-- Page -->
    <div class="page">

        <nav>
            <div class="nav-logo">
                <a href="index.html"
                    style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                    <img src="assets/logo.png" alt="Surge Logo" style="height: 32px; width: auto;" />
                    Surge
                </a>
            </div>
            <div class="nav-tabs">
                <a href="index.html" class="nav-tab">Home</a>
                <a href="before.html" class="nav-tab">Before</a>
                <a href="during.html" class="nav-tab active">During</a>
                <a href="after.html" class="nav-tab">After</a>
                <a href="detect.html" class="nav-tab">Command Center</a>
            </div>
        </nav>

        <!-- Hero Placeholder -->
        <section class="hero" style="min-height: 80vh;">
            <div class="hero-eyebrow">Evacuation Phase</div>
            <h1 class="hero-title">
                <span class="outline">During</span>
                <span class="accent">The Flood</span>
            </h1>
            <p class="hero-subtitle">
                Staying safe while the water rises. What to do, where to go, and how to survive.
            </p>
        </section>

        <!-- Bottom strip -->
        <div class="strip" style="position: absolute; bottom: 0; width: 100%;">
            <div class="strip-text">
                <strong>Surge</strong> — Data sourced from FEMA, NOAA, and Red Cross
                guidelines.
            </div>
            <div class="strip-hotline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013 12.18 19.79 19.79 0 013.07 3.5 2 2 0 015.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L9.09 9.91A16 16 0 0015 15.91l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
                </svg>
                Emergency: <strong>1-800-621-3362</strong>
            </div>
        </div>

    </div>

    <!-- Floating SOS -->
    <button class="sos-btn" onclick="alert('In a real emergency, call 911 immediately.')">SOS</button>

    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
        });
        (function animRing() {
            rx += (mx - rx) * 0.14; ry += (my - ry) * 0.14;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(animRing);
        })();

        const bar = document.getElementById('scrollBar');
        window.addEventListener('scroll', () => {
            const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
            bar.style.width = pct + '%';
        });

        const pCont = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
      left:${Math.random() * 100}%;
      bottom:${Math.random() * 30}%;
      --dur:${6 + Math.random() * 10}s;
      --delay:${Math.random() * 8}s;
      --drift:${(Math.random() - 0.5) * 60}px;
      width:${1 + Math.random() * 2}px; height:${1 + Math.random() * 2}px;
    `;
            pCont.appendChild(p);
        }
    </script>
</body>

</html>
